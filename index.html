// ── buildTimeEditor: for warmup/cooldown 'time' track exercises ───────────────
function buildTimeEditor(ex, wNum, secWrap){
  // Remove existing editor
  const existing = secWrap.querySelector('.time-editor-wrap');
  if(existing){ existing.remove(); return; }

  const wrap = el('div','time-editor-wrap');

  // Duration field
  const durRow = el('div','time-editor-row');
  const durLbl = el('div','time-editor-lbl');
  durLbl.textContent = '⏱ משך ('+ex.repsUnit+'):';
  const durInp = el('input','time-editor-inp');
  durInp.type='number'; durInp.min='1'; durInp.step='1';

  // Get current value from plannedSets or default
  const ps = plannedSets[ex.name];
  const curVal = ps&&ps.sets&&ps.sets[0]?ps.sets[0].reps:ex.defaultReps;
  durInp.value = curVal;

  durRow.append(durLbl, durInp);
  wrap.appendChild(durRow);

  const saveBtn = el('button','time-editor-save');
  saveBtn.textContent = '💾 שמור';
  saveBtn.onclick = ()=>{
    const v = parseInt(durInp.value)||ex.defaultReps;
    // Update plannedSets
    if(!plannedSets[ex.name]) plannedSets[ex.name]={rest:ex.defaultRest,sets:[{reps:ex.defaultReps,weight:0}]};
    plannedSets[ex.name].sets = [{reps:v,weight:0}];
    // Save as custom workout
    const current = getEffectiveWorkout(wNum).slice();
    current.forEach(e=>{ if(e.name===ex.name){ e.defaultReps=v; } });
    saveCustomWorkout(wNum, current);
    WORKOUT = getEffectiveWorkout(wNum);
    saveBtn.textContent='✅ נשמר!';
    setTimeout(()=>wrap.remove(), 1200);
    // Update display
    const durDisplay = secWrap.querySelector('.time-dur-display');
    if(durDisplay) durDisplay.textContent = v+' '+ex.repsUnit;
  };
  const cancelBtn = el('button','time-editor-cancel');
  cancelBtn.textContent='ביטול';
  cancelBtn.onclick=()=>wrap.remove();

  const btnRow=el('div','time-editor-btns');
  btnRow.append(saveBtn,cancelBtn);
  wrap.append(durRow,btnRow);
  secWrap.appendChild(wrap);
  setTimeout(()=>durInp.focus(),50);
}


// ── Move exercise up/down in plan ────────────────────────────────────────────
function moveExercise(wNum, exName, direction){
  const current = getEffectiveWorkout(wNum).slice();
  const idx = current.findIndex(e=>e.name===exName);
  if(idx<0) return;
  const newIdx = idx + direction; // -1=up, +1=down
  if(newIdx<0||newIdx>=current.length) return;
  // Swap
  const tmp = current[idx];
  current[idx] = current[newIdx];
  current[newIdx] = tmp;
  saveCustomWorkout(wNum, current);
  WORKOUT = getEffectiveWorkout(wNum);
  renderOverview(wNum, false);
}

// ── Add exercise to workout plan from DB ──────────────────────────────────────
function addExerciseToPlan(wNum, exName){
  const db = getExerciseDB();
  const ex = db[exName];
  if(!ex) return;
  const current = getEffectiveWorkout(wNum).slice();
  // Check not already in plan
  if(current.find(e=>e.name===exName)){
    alert('"'+exName+'" כבר בתוכנית!');
    return;
  }
  // Add exercise to end of its type group
  // Find last exercise of same type and insert after it
  const sameType = current.filter(e=>e.type===ex.type);
  const lastOfType = sameType.length ? sameType[sameType.length-1] : null;
  const insertIdx = lastOfType ? current.findIndex(e=>e.name===lastOfType.name)+1 : current.length;
  // Rebuild full exercise object from DB
  const fullEx = {
    type: ex.type||'exercise',
    name: ex.name,
    defaultSets: ex.defaultSets||3,
    defaultReps: ex.defaultReps||12,
    repsUnit: ex.repsUnit||'',
    defaultRest: ex.defaultRest||90,
    weight: 0,
    icon: ex.icon||'💪',
    muscle: ex.muscle||'',
    tips: ex.tips||'',
    yt: ex.yt||'how to '+ex.name,
    slides: (ex.slides||[]).map(s=>({img:s.img||null,dataUri:s.dataUri||null,cap:s.cap||''})),
    track: ex.track||true
  };
  current.splice(insertIdx, 0, fullEx);
  saveCustomWorkout(wNum, current);
  WORKOUT = getEffectiveWorkout(wNum);
  return true;
}

  // ── Track type ─────────────────────────────────────────────────────────────
  const trackRow=el('div','form-row');
  const trackLbl=el('div','form-lbl');trackLbl.textContent='סוג מדידה:';
  const trackSelect=el('div','form-type-select');
  let selectedTrack=ex.track||true;
  // Normalize track value
  if(selectedTrack===true) selectedTrack='reps';
  if(selectedTrack===false) selectedTrack='timed';
  if(selectedTrack==='timed') selectedTrack='timed';
  if(selectedTrack==='time') selectedTrack='timed';  // legacy: map 'time' to 'timed'

  const trackOptions=[
    ['reps','🔁 חזרות + משקל'],
    ['timed','⏱ ספירה לאחור'],
  ];
  trackOptions.forEach(([val,lbl])=>{
    const btn=el('button','type-btn'+(String(selectedTrack)===val?' type-btn-active':''));
    btn.textContent=lbl; btn.dataset.val=val;
    btn.onclick=()=>{
      selectedTrack=val;
      trackSelect.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('type-btn-active',b.dataset.val===val));
      updateRepsSection();
    };
    trackSelect.appendChild(btn);
  });
  trackRow.append(trackLbl,trackSelect); wrap.appendChild(trackRow);

  // ── Reps / Time defaults ───────────────────────────────────────────────────
  const repsSec=el('div','form-reps-sec');
  wrap.appendChild(repsSec);

  function updateRepsSection(){
    repsSec.innerHTML='';
    const r1=el('div','form-row');
    const setsLbl=el('div','form-lbl');setsLbl.textContent='סטים ברירת מחדל:';
    const setsInp=el('input','form-inp form-inp-sm');setsInp.type='number';setsInp.min='1';setsInp.step='1';
    setsInp.value=ex.defaultSets||3; setsInp.id='f-sets';
    r1.append(setsLbl,setsInp); repsSec.appendChild(r1);

    if(selectedTrack==='reps'){
      const r2=el('div','form-row');
      const rl=el('div','form-lbl');rl.textContent='חזרות ברירת מחדל:';
      const ri=el('input','form-inp form-inp-sm');ri.type='number';ri.min='1';ri.step='1';
      ri.value=ex.defaultReps||12; ri.id='f-reps';
      r2.append(rl,ri); repsSec.appendChild(r2);
    } else {
      // Timed: value + seconds/minutes toggle
      const r2=el('div','form-row');
      const rl=el('div','form-lbl');rl.textContent='זמן ברירת מחדל:';
      const ri=el('input','form-inp form-inp-sm');ri.type='number';
      ri.min='1';ri.max='90';ri.step='1';
      // Detect if existing is in minutes or seconds
      let initUnit=ex.repsUnit||'שניות';
      if(initUnit==='דקות'||initUnit==='דקה') initUnit='דקות';
      else initUnit='שניות';
      ri.value=ex.defaultReps||45; ri.id='f-reps';
      // Unit toggle buttons
      const unitToggle=el('div','form-unit-toggle');
      ['שניות','דקות'].forEach(u=>{
        const ub=el('button','unit-btn'+(initUnit===u?' unit-btn-active':''));
        ub.textContent=u; ub.type='button';
        ub.onclick=()=>{
          initUnit=u;
          unitToggle.querySelectorAll('.unit-btn').forEach(b=>b.classList.toggle('unit-btn-active',b.textContent===u));
          ri.max='90'; ri.min='1';
          if(parseInt(ri.value)>90) ri.value=90;
          if(parseInt(ri.value)<1) ri.value=1;
          // Update hidden unit field
          const uf=document.getElementById('f-unit');
          if(uf) uf.value=u;
        };
        unitToggle.appendChild(ub);
      });
      // Hidden unit field
      const unitHidden=el('input');unitHidden.type='hidden';unitHidden.id='f-unit';unitHidden.value=initUnit;
      r2.append(rl,ri,unitToggle,unitHidden); repsSec.appendChild(r2);
      // Validation: 1-90
      ri.oninput=()=>{
        let v=parseInt(ri.value);
        if(v>90){ri.value=90;}
        if(v<1&&ri.value!==''){ri.value=1;}
      };
    }
    const r3=el('div','form-row');
    const restLbl=el('div','form-lbl');restLbl.textContent='מנוחה (שנ\'):';
    const restInp=el('input','form-inp form-inp-sm');restInp.type='number';restInp.min='0';restInp.step='5';
    restInp.value=ex.defaultRest||90; restInp.id='f-rest';
    r3.append(restLbl,restInp); repsSec.appendChild(r3);
  }
  updateRepsSection();

  // ── Tips ───────────────────────────────────────────────────────────────────
  const tipsRow=el('div','form-row');
  const tipsLbl=el('div','form-lbl');tipsLbl.textContent='טיפ לביצוע:';
  const tipsInp=el('textarea','form-textarea');
  tipsInp.value=ex.tips||'';tipsInp.placeholder='הוראות ביצוע...';tipsInp.dir='rtl';
  tipsRow.append(tipsLbl,tipsInp); wrap.appendChild(tipsRow);

  // ── YouTube ────────────────────────────────────────────────────────────────
  const ytRow=el('div','form-row');
  const ytLbl=el('div','form-lbl');ytLbl.textContent='חיפוש יוטיוב:';
  const ytInp=el('input','form-inp');ytInp.type='text';
  ytInp.value=ex.yt||'';ytInp.placeholder='how to exercise name';ytInp.dir='ltr';
  ytRow.append(ytLbl,ytInp); wrap.appendChild(ytRow);

  // ── Images (0-2) ───────────────────────────────────────────────────────────
  const imgSec=el('div','form-img-sec');
  const imgLbl=el('div','form-lbl');imgLbl.textContent='תמונות (עד 2):';
  imgSec.appendChild(imgLbl);

  let slides=JSON.parse(JSON.stringify(ex.slides||[]));
  // For custom exercises, slides have {dataUri, cap} instead of {img, cap}
  const imgPreviews=el('div','form-img-previews');

  function renderImgPreviews(){
    imgPreviews.innerHTML='';
    slides.forEach((s,i)=>{
      const pw=el('div','form-img-preview-wrap');
      const img=el('img','form-img-preview');
      img.src=s.dataUri||IMGS[s.img]||'';
      const capInp=el('input','form-inp');capInp.type='text';
      capInp.value=s.cap||'';capInp.placeholder='כיתוב תמונה';capInp.dir='rtl';
      capInp.oninput=()=>{ slides[i].cap=capInp.value; };
      const removeBtn=el('button','form-img-remove');removeBtn.textContent='✕';
      removeBtn.onclick=()=>{ slides.splice(i,1); renderImgPreviews(); };
      pw.append(img,capInp,removeBtn);
      imgPreviews.appendChild(pw);
    });
    // Add button (only if < 2 images)
    if(slides.length<2){
      const addImgLbl=el('label','form-add-img-btn');
      addImgLbl.textContent='📷 הוסף תמונה';
      const fileInp=el('input');fileInp.type='file';fileInp.accept='image/*';fileInp.style.display='none';
      fileInp.onchange=(ev)=>{
        const file=ev.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=(e2)=>{
          // Compress via canvas
          const img2=new Image();
          img2.onload=()=>{
            const canvas=document.createElement('canvas');
            const maxW=400,maxH=300;
            let w=img2.width,h=img2.height;
            if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
            if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
            canvas.width=w;canvas.height=h;
            canvas.getContext('2d').drawImage(img2,0,0,w,h);
            const dataUri=canvas.toDataURL('image/jpeg',0.6);
            slides.push({dataUri,cap:'',img:null});
            renderImgPreviews();
          };
          img2.src=e2.target.result;
        };
        reader.readAsDataURL(file);
      };
      addImgLbl.appendChild(fileInp);
      imgPreviews.appendChild(addImgLbl);
    }
  }
  renderImgPreviews();
  imgSec.appendChild(imgPreviews);
  wrap.appendChild(imgSec);

  // ── Save button ────────────────────────────────────────────────────────────
  const saveBtn=el('button','btn-main');
  saveBtn.textContent=isEdit&&!isCopy?'💾 שמור שינויים':'➕ הוסף למאגר';
  saveBtn.onclick=()=>{
    const name=nameInp.value.trim();
    if(!name){ alert('יש להזין שם לתרגיל'); return; }
    const setsEl=document.getElementById('f-sets');
    const repsEl=document.getElementById('f-reps');
    const restEl=document.getElementById('f-rest');
    const unitEl=document.getElementById('f-unit');
    const trackVal = selectedTrack==='reps'?true:'timed';
    const newEx={
      type:selectedType,
      name:name,
      icon:iconInp.value||'💪',
      muscle:muscleInp.value.trim(),
      tips:tipsInp.value.trim(),
      yt:ytInp.value.trim()||('how to '+name),
      defaultSets:parseInt(setsEl?setsEl.value:3)||3,
      defaultReps:parseInt(repsEl?repsEl.value:12)||12,
      repsUnit:unitEl?unitEl.value.trim():(selectedTrack==='timed'?'שניות':''),
      defaultRest:parseInt(restEl?restEl.value:90)||90,
      weight:0,
      track:trackVal,
      slides:slides.map(s=>({dataUri:s.dataUri||null,img:s.img||null,cap:s.cap||''})),
    };
    // If editing, remove old name from DB first
    if(isEdit&&!isCopy&&ex.name&&ex.name!==name){
      const db=getExerciseDB();
      delete db[ex.name];
      try{ localStorage.setItem(EXERCISE_DB_KEY,JSON.stringify(db)); }catch(e){}
    }
    saveExerciseToDB(newEx);
    saveBtn.textContent='✅ נשמר!';
    setTimeout(()=>renderExerciseDBScreen(wNum),800);
  };
  wrap.appendChild(saveBtn);

  const cancelBtn=el('button','btn-secondary');
  cancelBtn.textContent='← חזרה למאגר';cancelBtn.style.marginTop='6px';
  cancelBtn.onclick=()=>renderExerciseDBScreen(wNum);
  wrap.appendChild(cancelBtn);

  setScreen(wrap);
}

renderWelcome();

</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error:',e));
  });
}
</script>
</body>
</html>
