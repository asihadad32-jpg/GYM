<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>האימון של לירון 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0a14;--surface:#16121f;--surface2:#1f1a2e;--border:#2e2840;
  --accent:#c084fc;--accent2:#f472b6;--accent3:#818cf8;
  --text:#f0eeff;--muted:#8b80a8;
  --fd:'Bebas Neue',sans-serif;--fb:'Heebo',sans-serif;
}
body{background:var(--bg);font-family:var(--fb);color:var(--text);min-height:100vh;overflow-x:hidden;overscroll-behavior-y:none;}
html{overscroll-behavior-y:none;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #c084fc44}50%{box-shadow:0 0 40px #c084fc88}}
@keyframes tick{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.orb1{position:fixed;top:-100px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,#c084fc18,transparent 70%);pointer-events:none;z-index:0}
.orb2{position:fixed;bottom:-80px;left:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,#f472b614,transparent 70%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:20px 16px 60px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.logo-text{font-family:var(--fd);letter-spacing:2px;font-size:16px;color:var(--accent)}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--fb)}
.progress-bar{background:var(--border);border-radius:4px;height:5px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent),var(--accent2));border-radius:4px;transition:width .5s ease}
.progress-text{color:var(--muted);font-size:11px;text-align:center;margin-bottom:10px}
.pill-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:20px}
.pill-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--muted);background:var(--surface);max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .3s}
.pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-weight:700}
.pill.done{color:var(--muted);background:var(--surface2)}
.welcome{animation:fadeIn .5s ease;display:flex;flex-direction:column;gap:20px}
.hero{text-align:center;padding:16px 0 8px}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px;box-shadow:0 0 32px #c084fc55;animation:glow 2s ease-in-out infinite}
.hero h1{font-family:var(--fd);font-size:52px;background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;line-height:1}
.hero p{color:var(--muted);font-size:14px;margin-top:10px;line-height:1.6}
.card{background:var(--surface2);border-radius:12px;border:1px solid var(--border);padding:12px 16px}
.card.purple{border-color:#3a2850}
.card-title{font-size:11px;font-weight:600;letter-spacing:1px;margin-bottom:8px}
.card-title.blue{color:#4fc3f7}.card-title.purple{color:var(--accent)}.card-title.green{color:#a5d6a7}
.ex-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px}
.ex-row+.ex-row{border-top:1px solid var(--border)}
.ex-row span:last-child{color:var(--muted);font-size:12px}
.notes{background:#1a1028;border:1px solid #3a2850;border-radius:12px;padding:12px 16px}
.notes ul{padding-right:16px;display:flex;flex-direction:column;gap:6px}
.notes li{font-size:12px;color:var(--muted);line-height:1.5}
.btn-main{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;padding:20px;font-size:20px;font-weight:700;cursor:pointer;font-family:var(--fb);letter-spacing:1px;box-shadow:0 0 32px #c084fc55;animation:glow 2s ease-in-out infinite;width:100%;transition:transform .1s}
.btn-main:active{transform:scale(.97)}
.exercise-screen{animation:slideUp .4s ease;display:flex;flex-direction:column;gap:16px}
.badge{display:flex;justify-content:center}
.badge span{border-radius:20px;padding:5px 18px;font-size:12px;font-weight:600;letter-spacing:1px}
.ex-name{font-family:var(--fd);font-size:clamp(28px,7vw,44px);letter-spacing:2px;line-height:1.1;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:2px}
.photo-slider{position:relative;border-radius:16px;overflow:hidden;background:var(--surface2);border:1px solid #3a2850;aspect-ratio:4/3}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .4s ease}
.slide.active{opacity:1;z-index:1}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,#0d0a14f2 0%,transparent 55%);z-index:2;pointer-events:none}
.slide-caption{position:absolute;bottom:34px;left:0;right:0;text-align:center;z-index:3;font-size:13px;font-weight:700;color:#fff;padding:0 14px;text-shadow:0 1px 8px #000e;line-height:1.4}
.slide-muscle{position:absolute;top:10px;left:10px;z-index:3;background:#00000099;border:1px solid #c084fc55;border-radius:20px;padding:4px 12px;font-size:11px;color:var(--accent)}
.slide-counter{position:absolute;top:10px;right:10px;z-index:3;background:#00000099;border-radius:20px;padding:4px 10px;font-size:11px;color:#fff}
.slide-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:4;background:#00000088;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:22px;transition:background .15s}
.slide-nav:active{background:#c084fc99}
.slide-nav.prev{left:8px}.slide-nav.next{right:8px}
.slide-dots{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:3}
.slide-dot{width:6px;height:6px;border-radius:50%;background:#ffffff44;cursor:pointer;transition:all .25s}
.slide-dot.active{background:var(--accent);width:18px;border-radius:3px}
.slide-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;animation:float 3s ease-in-out infinite}
.reps-box{background:var(--surface2);border-radius:14px;padding:16px 24px;text-align:center;border:1px solid var(--border)}
.reps-num{font-family:var(--fd);font-size:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1}
.reps-label{color:var(--muted);font-size:13px;margin-top:4px;display:block}
.sets-track{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.set-bar{height:8px;border-radius:4px;transition:all .35s ease}
.set-done{background:var(--accent)}.set-current{background:var(--accent2);box-shadow:0 0 10px #f472b688}.set-pending{background:var(--border)}
.set-label{color:var(--muted);font-size:12px;margin-top:8px;text-align:center}
.tip{background:#1a1028;border:1px solid #3a2850;border-radius:12px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start}
.tip p{font-size:13px;color:#d4b8f0;line-height:1.6}
.yt-link{display:flex;align-items:center;justify-content:center;gap:8px;background:#1a0a12;border:1px solid #3a1a2a;border-radius:12px;padding:12px 16px;color:#fb7185;text-decoration:none;font-size:14px;font-weight:500}
.rest-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0}
.rest-label{color:var(--muted);font-size:14px;font-weight:500;text-align:center;line-height:1.5}
.timer-ring{position:relative;width:140px;height:140px}
.timer-svg{transform:rotate(-90deg)}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-num{font-family:var(--fd);font-size:42px;line-height:1}
.timer-sec{font-size:11px;color:var(--muted);margin-top:2px}
.skip-btn{background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:10px 24px;font-size:13px;cursor:pointer;font-family:var(--fb)}
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:24px;animation:fadeIn .6s ease;text-align:center;padding:0 8px}
.done-title{font-family:var(--fd);font-size:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.done-text{color:var(--muted);font-size:16px;line-height:1.8;max-width:290px}
.btn-restart{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:14px 32px;font-size:15px;cursor:pointer;font-family:var(--fb)}

/* Welcome */
.workout-selector{display:flex;flex-direction:column;gap:14px}
.workout-btn{background:var(--surface2);border:1px solid #3a2850;border-radius:16px;padding:18px;text-align:right;cursor:pointer;transition:all .2s;font-family:var(--fb);width:100%}
.workout-btn:active{transform:scale(.98)}
.workout-btn.w2{border-color:#1a3a2a}
.wb-title{font-family:var(--fd);font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;margin-bottom:4px}
.workout-btn.w2 .wb-title{background:linear-gradient(135deg,#4fc3f7,#a5d6a7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wb-sub{color:var(--text);font-size:14px;font-weight:600;margin-bottom:6px}
.wb-detail{color:var(--muted);font-size:12px;line-height:1.5}
.hist-badge{background:#1a1028;border:1px solid #3a2850;border-radius:10px;padding:5px 12px;font-size:11px;color:var(--accent2);display:inline-flex;align-items:center;gap:4px}
/* Overview */
.overview{animation:fadeIn .4s ease;display:flex;flex-direction:column;gap:16px}
.ov-header{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.ov-title{font-family:var(--fd);font-size:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.ov-sub{color:var(--muted);font-size:13px}
.ov-section-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;padding:0 2px;margin-top:4px}
.ov-section-title.warmup{color:#4fc3f7}
.ov-section-title.exercise{color:var(--accent)}
.ov-section-title.cooldown{color:#a5d6a7}
.warmup-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:13px}
.warmup-dur{color:var(--muted);font-size:12px}
/* Set planner card */
.plan-card{background:var(--surface2);border:1px solid #3a2850;border-radius:16px;overflow:hidden;margin-bottom:12px}
.plan-top{display:flex;align-items:center;gap:12px;padding:12px 14px 10px}
.plan-thumb{flex-shrink:0}
.plan-thumb img{width:72px;height:50px;object-fit:cover;border-radius:8px}
.plan-ico{font-size:36px;width:72px;text-align:center;flex-shrink:0}
.plan-info{flex:1}
.plan-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.plan-muscle{font-size:11px;color:var(--accent)}
/* Rest row */
.plan-rest-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:1px solid var(--border);background:#16121f}
.plan-rest-lbl{font-size:12px;color:var(--muted);flex:1}
.plan-rest-inp{width:64px;background:#0d0a14;border:1px solid var(--accent);border-radius:8px;color:var(--text);font-size:16px;font-weight:700;text-align:center;padding:5px 4px;font-family:var(--fb)}
.plan-rest-unit{font-size:12px;color:var(--muted)}
/* Sets */
.plan-sets-wrap{padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px}
.plan-set-row{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:end;background:#0d0a14;border-radius:10px;padding:10px 12px}
.plan-set-lbl{font-size:11px;color:var(--muted);font-weight:700;padding-bottom:4px;white-space:nowrap}
.plan-inp-wrap{display:flex;flex-direction:column;gap:3px}
.plan-inp-lbl{font-size:10px;color:var(--accent);font-weight:600}
.plan-inp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:17px;font-weight:700;text-align:center;padding:6px 4px;font-family:var(--fb);width:100%}
.plan-inp:focus{border-color:var(--accent);outline:none}
.plan-del-btn{background:#2a1018;border:1px solid #4a2030;border-radius:8px;color:#f472b6;font-size:16px;padding:8px 10px;cursor:pointer;align-self:flex-end}
.plan-del-btn:active{background:#3a1828}
.plan-add-btn{background:#1a1028;border:1px dashed #4a3060;border-radius:10px;color:var(--accent);font-size:14px;font-weight:600;padding:10px;cursor:pointer;text-align:center;width:100%;font-family:var(--fb)}
.plan-add-btn:active{background:#241535}
.plan-card-skipped{border-color:#5a3a10!important;background:#1a1008}
.plan-card-skipped .plan-name{color:#f0a060}
/* Inline edit during workout */
.edit-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:var(--surface2);border:1px solid #3a2850;border-radius:12px;padding:12px}
.edit-box{display:flex;flex-direction:column;gap:4px;align-items:center}
.edit-lbl{font-size:10px;color:var(--accent);font-weight:600;text-align:center}
.edit-inp{background:#0d0a14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:17px;font-weight:700;text-align:center;padding:6px 2px;font-family:var(--fb);width:100%}
.edit-inp:focus{border-color:var(--accent);outline:none}
.edit-unit{font-size:10px;color:var(--muted)}
/* Secondary buttons */
.sec-btn-row{display:flex;flex-direction:column;gap:8px}
.btn-early{background:#1a2810;border:1px solid #3a5020;border-radius:12px;color:#a5d6a7;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);text-align:center;width:100%}
.btn-skip{background:#1a1028;border:1px solid #3a2850;border-radius:12px;color:var(--muted);padding:12px 16px;font-size:14px;cursor:pointer;font-family:var(--fb);text-align:center;width:100%}
/* Skipped */
.pill.skipped{background:#2a1a0a;border-color:#5a3a10;color:#f0a060}
.skipped-banner{background:#2a1a0a;border:1px solid #5a3a10;border-radius:10px;padding:8px 14px;font-size:13px;color:#f0a060;text-align:center;margin-bottom:4px}
.skipped-card{background:var(--surface2);border:1px solid #5a3a10;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.skipped-card-name{font-size:16px;font-weight:700;color:#f0a060}
/* Summary */
.summary-screen{animation:fadeIn .5s ease;display:flex;flex-direction:column;gap:14px}
.sum-title{font-family:var(--fd);font-size:40px;text-align:center;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.sum-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum-stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.sum-stat-val{font-family:var(--fd);font-size:32px;color:var(--accent);display:block}
.sum-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.sum-table{background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.sum-ex-header{background:#1a1028;padding:10px 14px;border-bottom:1px solid var(--border)}
.sum-ex-name{font-size:13px;font-weight:700;color:var(--accent)}
.sum-skip-row{padding:8px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
.sum-set-row{display:grid;grid-template-columns:.5fr 1fr 1fr 1fr;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.sum-set-row:last-child{border-bottom:none}
.sum-set-row.header{background:#0d0a14;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px}
.num-col{text-align:center;color:var(--accent2);font-weight:600}
.sum-copy{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:var(--accent);font-size:14px;font-weight:600}
.done-text{color:var(--muted);font-size:15px;line-height:1.8;max-width:290px;margin:0 auto}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:14px 32px;font-size:15px;cursor:pointer;font-family:var(--fb);width:100%}

.hero-bg {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  padding: 52px 16px 44px;
  text-align: center;
  margin-bottom: 4px;
}
.hero-bg::before {
  content: '';

/* ── History Screen ── */
.history-screen{animation:fadeIn .4s ease;display:flex;flex-direction:column;gap:14px}
.hist-screen-title{font-family:var(--fd);font-size:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;text-align:center}
.io-row{display:flex;gap:10px}
.io-btn{flex:1;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:var(--fb);border:1px solid var(--border)}
.export-btn{background:var(--surface2);color:var(--accent);border-color:#3a2850}
.import-btn{background:var(--surface2);color:#4fc3f7;border-color:#1a3a4a;display:block}
.io-import-wrap{flex:1}
.hist-tabs{display:flex;gap:8px;background:var(--surface2);border-radius:12px;padding:4px}
.hist-tab{flex:1;border:none;border-radius:9px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);background:transparent;color:var(--muted);transition:all .2s}
.hist-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.hist-content{display:flex;flex-direction:column;gap:12px}
.hist-empty{text-align:center;color:var(--muted);padding:32px;font-size:14px}
.hist-summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hist-summary-stat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.hist-stat-val{font-family:var(--fd);font-size:26px;color:var(--accent);line-height:1}
.hist-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.hist-section-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-top:4px}
/* Chart */
.chart-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;overflow:hidden}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.chart-note{font-size:12px;color:var(--muted);padding:8px 0}
.chart-badge{font-size:12px;font-weight:600;margin-top:8px;padding:4px 10px;border-radius:20px;display:inline-block}
.chart-badge.up{background:#1a2810;color:#a5d6a7;border:1px solid #3a5020}
.chart-badge.down{background:#2a1018;color:#f472b6;border:1px solid #4a2030}
/* Sessions */
.sess-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.sess-hdr{display:flex;justify-content:space-between;align-items:center}
.sess-date{font-size:13px;font-weight:700;color:var(--text)}
.sess-dur{font-size:12px;color:var(--accent2)}
.sess-ex-row{border-top:1px solid var(--border);padding-top:7px}
.sess-ex-name{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:4px}
.sess-sets{display:flex;flex-wrap:wrap;gap:5px}
.sess-set{background:#0d0a14;border:1px solid var(--border);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--muted)}
.sess-del-btn{background:#1a1028;border:1px solid #3a2040;border-radius:8px;color:#f472b688;font-size:12px;padding:6px 12px;cursor:pointer;font-family:var(--fb);align-self:flex-end;margin-top:4px}
.hist-nav-btn{background:var(--surface2);border:1px solid #3a2850;border-radius:12px;color:var(--muted);padding:14px;font-size:14px;cursor:pointer;font-family:var(--fb);width:100%;text-align:center}
.hist-nav-btn:active{background:var(--surface)}
.save-plan-btn{background:var(--surface2);border:1px solid var(--accent3);border-radius:12px;color:var(--accent3);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fb);width:100%;text-align:center;transition:all .2s}
.save-plan-btn:active{background:#1a1a2e}
.manual-save-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--fb);width:100%;transition:all .2s}
.manual-save-btn:active{transform:scale(.97)}
.btn-prev-ex{background:#0d0a14;border:1px solid var(--border);border-radius:12px;color:var(--muted);padding:10px 16px;font-size:13px;cursor:pointer;font-family:var(--fb);text-align:center;width:100%}
.btn-prev-ex:active{background:var(--surface)}

/* ── Workout Timer ── */
.workout-timer{
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  background:#1f1a2e;
  border:1px solid #3a2850;
  border-radius:20px;
  padding:4px 14px;
  font-family:var(--fd);
  font-size:16px;
  color:var(--accent);
  letter-spacing:1px;
  z-index:100;
  display:none;
  box-shadow:0 2px 12px #c084fc22;
  pointer-events:none;
}
.workout-timer.visible{ display:block; }

.resume-screen{display:flex;flex-direction:column;gap:16px;padding:40px 0;animation:fadeIn .4s ease}
.resume-title{font-family:var(--fd);font-size:42px;color:var(--accent2);text-align:center;letter-spacing:2px}
.resume-info{background:var(--surface2);border:1px solid #3a2850;border-radius:14px;padding:16px;text-align:center;font-size:15px;line-height:1.7;color:var(--muted)}
.resume-info strong{color:var(--text)}
.resume-discard-btn{background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);padding:14px;font-size:14px;cursor:pointer;font-family:var(--fb);text-align:center;width:100%}
.resume-discard-btn:active{background:var(--surface)}

/* ── Overview YT + Delete controls ── */
.ov-yt-row{display:flex;align-items:center;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:#0d0a1488;flex-wrap:nowrap;overflow:hidden}
.ov-yt-link{flex:1;font-size:11px;color:#fb7185;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ov-yt-edit-btn{flex-shrink:0;background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:14px;cursor:pointer}
.ov-del-btn{flex-shrink:0;background:#2a1018;border:1px solid #4a2030;border-radius:8px;padding:4px 8px;font-size:14px;cursor:pointer}
.ov-del-btn:active{background:#3a1828}
/* Simple exercise row (non-tracked) */
.simple-ex-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden}
.ov-yt-row-sm{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);background:#0d0a1444}
.ov-yt-link-sm{flex:1;font-size:10px;color:#fb7185;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-yt-edit-btn-sm{flex-shrink:0;background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer}
.ov-del-btn-sm{margin-right:auto;background:#2a1018;border:1px solid #4a2030;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer}
/* YT Editor */
.yt-editor-wrap{background:#1a1028;border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin:8px 14px;display:flex;flex-direction:column;gap:8px}
.yt-editor-lbl{font-size:11px;color:var(--accent);font-weight:600}
.yt-editor-inp{background:#0d0a14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 10px;font-family:monospace;width:100%}
.yt-editor-inp:focus{border-color:var(--accent);outline:none}
.yt-editor-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.yt-editor-preview{font-size:12px;color:#4fc3f7;text-decoration:none}
.yt-editor-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.yt-editor-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--fb)}
/* Warmup/cooldown rows with delete */
.warmup-row .ov-del-btn-sm{margin-right:auto}
.plan-name-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.plan-name-row .plan-name{flex:1}
.plan-name-row .ov-del-btn{padding:3px 8px;font-size:13px}

/* ── Time Editor ── */
.time-editor-wrap{background:#1a1028;border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin:8px 0;display:flex;flex-direction:column;gap:8px}
.time-editor-row{display:flex;align-items:center;gap:10px}
.time-editor-lbl{font-size:12px;color:var(--accent);font-weight:600;flex:1}
.time-editor-inp{width:70px;background:#0d0a14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;font-weight:700;text-align:center;padding:6px 4px;font-family:var(--fb)}
.time-editor-inp:focus{border-color:var(--accent);outline:none}
.time-editor-btns{display:flex;gap:8px}
.time-editor-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.time-editor-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--fb)}

/* ── Move buttons ── */
.ov-move-btn{background:#1a1028;border:1px solid #3a2850;border-radius:8px;color:var(--accent);font-size:15px;font-weight:700;padding:5px 14px;cursor:pointer;line-height:1;transition:background .15s}
.ov-move-btn:active{background:#c084fc33}
.ov-move-btn-sm{background:#1a1028;border:1px solid #3a2850;border-radius:6px;color:var(--accent);font-size:13px;font-weight:700;padding:4px 11px;cursor:pointer;line-height:1}
.ov-move-btn-sm:active{background:#c084fc33}
/* Action row below name */
.plan-act-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.plan-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;word-break:break-word}
/* Simple exercise action row */
.simple-act-row{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);background:#0d0a1444}

/* ── Exercise DB Screen ── */
.db-screen{animation:fadeIn .4s ease;display:flex;flex-direction:column;gap:14px}
.db-title{font-family:var(--fd);font-size:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;text-align:center}
.db-sub{color:var(--muted);font-size:13px;text-align:center}
.db-section{display:flex;flex-direction:column;gap:6px}
.db-section-title{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.db-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:border-color .2s}
.db-card-in-plan{border-color:#3a5020;background:#1a2810}
.db-card-top{display:flex;align-items:center;gap:10px}
.db-ico{font-size:24px;flex-shrink:0}
.db-info{flex:1;min-width:0}
.db-nm{font-size:14px;font-weight:700;color:var(--text)}
.db-ms{font-size:11px;color:var(--accent);margin-top:1px}
.db-btn-add{flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fb)}
.db-btn-add:active{transform:scale(.96)}
.db-btn-inplan{flex-shrink:0;background:#1a2810;color:#a5d6a7;border:1px solid #3a5020;border-radius:10px;padding:8px 14px;font-size:12px;font-family:var(--fb)}
/* Open DB button in overview */
.db-open-btn{background:var(--surface2);border:1px solid #3a2850;border-radius:12px;color:var(--accent);padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb);width:100%;text-align:center;transition:background .2s}
.db-open-btn:active{background:#1a1028}

/* ── Exercise Form ── */
.ex-form-screen{animation:fadeIn .4s ease;display:flex;flex-direction:column;gap:14px;padding-bottom:20px}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-lbl{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.form-inp{background:#0d0a14;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:10px 12px;font-family:var(--fb);width:100%}
.form-inp:focus{border-color:var(--accent);outline:none}
.form-inp-sm{width:auto;min-width:70px;display:inline-block}
.form-textarea{background:#0d0a14;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 12px;font-family:var(--fb);width:100%;min-height:80px;resize:vertical}
.form-textarea:focus{border-color:var(--accent);outline:none}
.form-type-select{display:flex;gap:6px;flex-wrap:wrap}
.type-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 12px;font-size:13px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.type-btn-active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
.form-reps-sec{display:flex;flex-direction:column;gap:10px;background:var(--surface2);border-radius:12px;padding:12px;border:1px solid var(--border)}
.form-img-sec{display:flex;flex-direction:column;gap:8px}
.form-img-previews{display:flex;flex-direction:column;gap:10px}
.form-img-preview-wrap{display:flex;flex-direction:column;gap:6px;background:var(--surface2);border-radius:10px;padding:10px;border:1px solid var(--border)}
.form-img-preview{width:100%;max-height:180px;object-fit:cover;border-radius:8px}
.form-img-remove{background:#2a1018;border:1px solid #4a2030;border-radius:8px;color:#f472b6;padding:6px 14px;font-size:13px;cursor:pointer;font-family:var(--fb);align-self:flex-end}
.form-add-img-btn{display:block;background:var(--surface2);border:1px dashed var(--accent);border-radius:10px;color:var(--accent);padding:14px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;font-family:var(--fb)}
/* DB Screen additions */
.db-search-wrap{position:sticky;top:0;background:var(--bg);padding:4px 0 8px;z-index:10}
.db-search-inp{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;padding:11px 14px;font-family:var(--fb);width:100%}
.db-search-inp:focus{border-color:var(--accent);outline:none}
.db-add-new-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fb);width:100%;text-align:center}
.db-add-new-btn:active{transform:scale(.97)}
.db-act-wrap{display:flex;gap:6px;align-items:center;flex-shrink:0}
.db-top-act{display:flex;gap:6px;margin-top:4px}
.db-btn-edit{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;font-family:var(--fb)}
.db-btn-copy{background:var(--surface);border:1px solid #3a4a20;border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;color:#a5d6a7;font-family:var(--fb)}
.db-btn-edit:active,.db-btn-copy:active{background:var(--surface2)}
.db-add-row{padding:8px 14px 12px;display:flex}
.db-add-row .db-btn-add,.db-add-row .db-btn-inplan{width:100%;text-align:center;padding:10px}
.db-empty{text-align:center;color:var(--muted);padding:32px;font-size:14px}
.db-cards-container{display:flex;flex-direction:column;gap:14px}

.form-unit-toggle{display:flex;gap:4px;margin-top:4px}
.unit-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 14px;font-size:13px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.unit-btn-active{background:var(--accent);color:#fff;border-color:transparent}

.timed-ex-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
.timed-start-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:14px;padding:16px 32px;font-size:18px;font-weight:700;cursor:pointer;font-family:var(--fb);min-width:160px;transition:transform .1s}
.timed-start-btn:active{transform:scale(.97)}
</style>

// ── Storage ───────────────────────────────────────────────────────────────────
function storageKey(n){ return 'liron_w'+n+'_history'; }
function getHistory(n){ try{ return JSON.parse(localStorage.getItem(storageKey(n))||'[]'); }catch(e){ return []; } }
function saveHistory(n,s){ try{ localStorage.setItem(storageKey(n),JSON.stringify(s.slice(-30))); }catch(e){} }
function getLastSession(n){ const h=getHistory(n); return h.length?h[h.length-1]:null; }
function getLastExData(n,name){ const last=getLastSession(n); if(!last)return null; return last.exercises.find(e=>e.name===name)||null; }
function saveSession(n,data){ 
  const h=getHistory(n); h.push(data); saveHistory(n,h);
  // Backup to sessionStorage as fallback
  try{ sessionStorage.setItem('liron_last_session',JSON.stringify(data)); }catch(e){}
}
function formatTime(s){
  if(s==null||isNaN(s))return '—';
  if(s<60)return s+'ש\'';
  return Math.floor(s/60)+'ד\''+(s%60?' '+s%60+'ש\'':'');
}
function nowSec(){ return Math.floor(Date.now()/1000); }

// ── Init planned sets for an exercise ────────────────────────────────────────
function initPlannedSets(wNum, ex){
  // Also init for time-tracked exercises
  if(ex.track==='time'){
    plannedSets[ex.name]={rest:ex.defaultRest,sets:[{reps:ex.defaultReps,weight:0}]};
    return;
  }
  const last=getLastExData(wNum, ex.name);
  if(last && last.setDetails && last.setDetails.length){
    plannedSets[ex.name]={
      rest: last.rest||ex.defaultRest,
      sets: last.setDetails.map(s=>({reps:s.reps||ex.defaultReps, weight:s.weight!=null?s.weight:0}))
    };
  } else {
    const sets=[];
    for(let i=0;i<ex.defaultSets;i++) sets.push({reps:ex.defaultReps, weight:0});
    plannedSets[ex.name]={rest:ex.defaultRest, sets};
  }
}

// ── Audio + vibrate ───────────────────────────────────────────────────────────
function beepAndVibrate(){
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.4,0.8].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function el(tag,cls){ const e=document.createElement(tag); if(cls)e.className=cls; return e; }

function ytLink(q){ return 'https://www.youtube.com/results?search_query='+encodeURIComponent(q); }
function typeStyle(t){

  if(t==='exercise') return{bg:'linear-gradient(135deg,#c084fc,#f472b6)',color:'#fff'};

}

// ── Slider ────────────────────────────────────────────────────────────────────
function stopSlideTimer(){ if(slideTimer){clearInterval(slideTimer);slideTimer=null;} }
function goToSlide(n){
  const slides=document.querySelectorAll('.slide'),dots=document.querySelectorAll('.slide-dot');
  const ctr=document.getElementById('slide-counter');
  if(!slides.length)return;
  const total=slides.length;
  curSlide=((n%total)+total)%total;
  slides.forEach((e,i)=>e.classList.toggle('active',i===curSlide));
  dots.forEach((e,i)=>e.classList.toggle('active',i===curSlide));
  if(ctr)ctr.textContent=(curSlide+1)+' / '+total;
}
function prevSlide(){ stopSlideTimer();goToSlide(curSlide-1);startSlideTimer(); }
function nextSlide(){ stopSlideTimer();goToSlide(curSlide+1);startSlideTimer(); }
function dotSlide(n){ stopSlideTimer();goToSlide(n);startSlideTimer(); }
function startSlideTimer(){ stopSlideTimer(); slideTimer=setInterval(()=>goToSlide(curSlide+1),3000); }

function buildSlider(ex){
  const wrap=el('div','photo-slider');
  if(!ex.slides||!ex.slides.length){
    const ico=el('div','slide-icon');ico.textContent=ex.icon;
    const mus=el('div','slide-muscle');mus.textContent=ex.muscle;
    wrap.append(ico,mus);return wrap;
  }
  ex.slides.forEach((s,i)=>{
    const slide=el('div','slide'+(i===0?' active':''));
    const img=el('img');img.src=s.dataUri||(s.img?IMGS[s.img]||'':'');img.alt='';
    const ov=el('div','slide-overlay');
    const cap=el('div','slide-caption');cap.textContent=s.cap;
    slide.append(img,ov,cap);wrap.appendChild(slide);
  });
  const mus=el('div','slide-muscle');mus.textContent=ex.muscle;
  const ctr=el('div','slide-counter');ctr.id='slide-counter';ctr.textContent='1 / '+ex.slides.length;
  const prev=el('button','slide-nav prev');prev.textContent='‹';prev.onclick=prevSlide;
  const next=el('button','slide-nav next');next.textContent='›';next.onclick=nextSlide;
  const dots=el('div','slide-dots');
  ex.slides.forEach((_,i)=>{ const d=el('div','slide-dot'+(i===0?' active':''));d.onclick=()=>dotSlide(i);dots.appendChild(d); });
  wrap.append(mus,ctr,prev,next,dots);return wrap;
}

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress(){
  document.getElementById('progressFill').style.width=(exIdx/WORKOUT.length*100)+'%';
  document.getElementById('progressText').textContent=exIdx+' / '+WORKOUT.length+' תרגילים'+(skippedQueue.length?' • ⏭ '+skippedQueue.length+' ממתינים':'');
  const bar=document.getElementById('pillBar');bar.innerHTML='';
  WORKOUT.forEach((e,i)=>{
    const skipped=skippedQueue.includes(i);
    const p=el('div','pill'+(i===exIdx?' active':i<exIdx?' done':skipped?' skipped':''));
    p.title=e.name;p.textContent=(i<exIdx?'✓':skipped?'⏭':(i+1)+'.')+' '+e.name;
    bar.appendChild(p);
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function handleBack(){
  stopSlideTimer();clearInterval(timerInterval);
  if(appScreen==='overview'){
    // Warn before losing workout data
    if(sessionLog.length>0||currentExLog){
      if(!confirm('חזרה לתפריט תבטל את האימון הנוכחי. בטוח?'))return;
    }
    stopWorkoutTimer();
    renderWelcome();
  }
  else if(appScreen==='exercise'||appScreen==='rest'){
    // Save current exercise state before going to overview
    // currentExLog stays in memory - not lost
    renderOverview(currentWorkoutNum,true);
  }
  else if(appScreen==='summary')renderWelcome();
  else if(appScreen==='history')renderWelcome();
  else if(appScreen==='exercisedb')renderOverview(currentWorkoutNum,false);
  else if(appScreen==='exerciseform')renderExerciseDBScreen(currentWorkoutNum);
  else renderWelcome();
}

// Get custom workout (or null if not customized)
function getCustomWorkout(wNum){
  try{
    const raw=localStorage.getItem(wNum===1?LIBRARY_KEY_W1:LIBRARY_KEY_W2);
    return raw?JSON.parse(raw):null;
  }catch(e){ return null; }
}

// Save custom workout
function saveCustomWorkout(wNum, workout){
  try{
    localStorage.setItem(wNum===1?LIBRARY_KEY_W1:LIBRARY_KEY_W2, JSON.stringify(workout));
    return true;
  }catch(e){ return false; }
}

// Get exercise DB (all exercises ever used, for future plan building)
function getExerciseDB(){
  try{
    const raw=localStorage.getItem(EXERCISE_DB_KEY);
    return raw?JSON.parse(raw):{};
  }catch(e){ return {}; }
}

// Save/update an exercise in the DB
function saveExerciseToDB(ex){
  try{
    const db=getExerciseDB();
    db[ex.name]={
      name:ex.name, type:ex.type, muscle:ex.muscle,
      tips:ex.tips, yt:ex.yt, icon:ex.icon,
      defaultSets:ex.defaultSets, defaultReps:ex.defaultReps,
      repsUnit:ex.repsUnit||'', defaultRest:ex.defaultRest,
      track:ex.track, slides:ex.slides||[], updatedAt:Date.now()
    };
    localStorage.setItem(EXERCISE_DB_KEY, JSON.stringify(db));
  }catch(e){}
}

// Load effective workout (custom if exists, else default)
function getEffectiveWorkout(wNum){
  const custom=getCustomWorkout(wNum);
  if(custom&&custom.length>0) return custom;
  return wNum===1?W1:W2;
}

// Initialize DB from default workouts on first load
function initExerciseDB(){
  const db=getExerciseDB();
  if(Object.keys(db).length===0){
    [...W1,...W2].forEach(ex=>saveExerciseToDB(ex));
  }
}

// Delete exercise from workout plan (permanent)
function deleteExerciseFromPlan(wNum, exName){
  const current=getEffectiveWorkout(wNum).slice();
  const updated=current.filter(e=>e.name!==exName);
  saveCustomWorkout(wNum, updated);
  // Keep in DB for future use
  return updated;
}

// Update YouTube link for exercise in both plan and DB
function updateExerciseYT(wNum, exName, newYT){
  const current=getEffectiveWorkout(wNum).slice();
  current.forEach(e=>{ if(e.name===exName) e.yt=newYT; });
  saveCustomWorkout(wNum, current);
  // Update DB too
  const db=getExerciseDB();
  if(db[exName]) db[exName].yt=newYT;
  try{ localStorage.setItem(EXERCISE_DB_KEY, JSON.stringify(db)); }catch(e){}
}


function showYTEditor(ex, wNum, card){
  // Remove any existing editor
  const existing=card.querySelector('.yt-editor-wrap');
  if(existing){ existing.remove(); return; }

  const wrap=el('div','yt-editor-wrap');
  const lbl=el('div','yt-editor-lbl');lbl.textContent='ערכי מונח חיפוש ביוטיוב:';
  const inp=el('input','yt-editor-inp');
  inp.type='text'; inp.value=ex.yt; inp.placeholder='how to exercise name';
  inp.dir='ltr';

  const previewLink=el('a','yt-editor-preview');
  previewLink.textContent='👁 תצוגה מקדימה';
  previewLink.target='_blank';
  previewLink.href=ytLink(ex.yt);
  inp.oninput=()=>{ previewLink.href=ytLink(inp.value); };

  const saveBtn=el('button','yt-editor-save');
  saveBtn.textContent='💾 שמור';
  saveBtn.onclick=()=>{
    const newYT=inp.value.trim();
    if(!newYT) return;
    updateExerciseYT(wNum, ex.name, newYT);
    WORKOUT=getEffectiveWorkout(wNum);
    // Update the link text in the card
    const ytLinkEl=card.querySelector('.ov-yt-link');
    if(ytLinkEl){ ytLinkEl.href=ytLink(newYT); ytLinkEl.textContent='▶ '+newYT; }
    saveBtn.textContent='✅ נשמר!';
    setTimeout(()=>{ wrap.remove(); },1200);
  };
  const cancelBtn=el('button','yt-editor-cancel');
  cancelBtn.textContent='ביטול';
  cancelBtn.onclick=()=>wrap.remove();

  const btnRow=el('div','yt-editor-btns');
  btnRow.append(previewLink, saveBtn, cancelBtn);
  wrap.append(lbl, inp, btnRow);
  card.appendChild(wrap);
  setTimeout(()=>inp.focus(),50);
}

// ── Build set planner for one exercise ───────────────────────────────────────
function buildSetPlanner(ex, wNum){
  if(!ex.track) return null;
  if(!plannedSets[ex.name]) initPlannedSets(wNum, ex);
  const ps=plannedSets[ex.name];

  const card=el('div','plan-card');

  // Header: name + muscle
  const topRow=el('div','plan-top');
  if(ex.slides&&ex.slides.length){
    const thumb=el('div','plan-thumb');
    const img=el('img');img.src=IMGS[ex.slides[0].img]||'';img.alt='';
    thumb.appendChild(img);topRow.appendChild(thumb);
  } else {
    const ico=el('div','plan-ico');ico.textContent=ex.icon;topRow.appendChild(ico);
  }
  const info=el('div','plan-info');
  const nm=el('div','plan-name');nm.textContent=ex.name;
  const ms=el('div','plan-muscle');ms.textContent=ex.muscle;
  const delBtn2=el('button','ov-del-btn');
  delBtn2.textContent='🗑';delBtn2.title='הסר מהתוכנית';
  delBtn2.onclick=(()=>{ const exName=ex.name; const wNum=currentWorkoutNum; return ()=>{ if(!confirm('להסיר את "'+exName+'" מהתוכנית?')) return; deleteExerciseFromPlan(wNum,exName); WORKOUT=getEffectiveWorkout(wNum); renderOverview(wNum,false); }; })();
  const upBtnPlan=el('button','ov-move-btn');upBtnPlan.textContent='↑';upBtnPlan.title='הזז למעלה';
  upBtnPlan.onclick=(()=>{ const n=ex.name; return ()=>moveExercise(currentWorkoutNum,n,-1); })();
  const dnBtnPlan=el('button','ov-move-btn');dnBtnPlan.textContent='↓';dnBtnPlan.title='הזז למטה';
  dnBtnPlan.onclick=(()=>{ const n=ex.name; return ()=>moveExercise(currentWorkoutNum,n,1); })();
  const actRow=el('div','plan-act-row');
  actRow.append(upBtnPlan,dnBtnPlan,delBtn2);
  info.append(nm,ms,actRow);topRow.appendChild(info);
  card.appendChild(topRow);

  // ── YouTube link + edit row ────────────────────────────────────
  const ytRow=el('div','ov-yt-row');
  const ytLinkEl=el('a','ov-yt-link');
  ytLinkEl.href=ytLink(ex.yt); ytLinkEl.target='_blank';
  ytLinkEl.textContent='▶ '+ex.yt; ytLinkEl.title=ex.yt;
  const editYTBtn=el('button','ov-yt-edit-btn');
  editYTBtn.textContent='✏️'; editYTBtn.title='ערכי קישור יוטיוב';
  editYTBtn.onclick=(()=>{ const e2=ex; return ()=>showYTEditor(e2,currentWorkoutNum,card); })();
  ytRow.append(ytLinkEl,editYTBtn);
  card.appendChild(ytRow);

  // Rest time row
  const restRow=el('div','plan-rest-row');
  const restLbl=el('label','plan-rest-lbl');restLbl.textContent='💤 מנוחה בין סטים:';
  const restInp=el('input','plan-rest-inp');
  restInp.type='number';restInp.min='0';restInp.step='5';
  restInp.value=ps.rest;
  restInp.oninput=()=>{ ps.rest=parseInt(restInp.value)||0; };
  const restUnit=el('span','plan-rest-unit');restUnit.textContent='שניות';
  restRow.append(restLbl,restInp,restUnit);
  card.appendChild(restRow);

  // Sets container
  const setsWrap=el('div','plan-sets-wrap');
  setsWrap.id='sets-'+ex.name.replace(/[^a-zA-Z0-9]/g,'_');

  function renderSetRows(){
    setsWrap.innerHTML='';
    ps.sets.forEach((s,i)=>{
      const row=el('div','plan-set-row');

      // Set label
      const lbl=el('div','plan-set-lbl');lbl.textContent='סט '+(i+1);

      // Reps input
      const repsWrap=el('div','plan-inp-wrap');
      const repsLbl=el('div','plan-inp-lbl');repsLbl.textContent=ex.track==='timed'?'⏱ זמן (שנ\')':'חזרות';
      const repsInp=el('input','plan-inp');
      repsInp.type='number';repsInp.min='1';repsInp.step='1';
      repsInp.value=s.reps||'';repsInp.placeholder=String(ex.defaultReps);
      repsInp.oninput=(()=>{ const idx=i; return ()=>{ 
        const v=parseInt(repsInp.value);
        ps.sets[idx].reps=(isNaN(v)||v<=0)?ex.defaultReps:v; 
      }; })();
      repsWrap.append(repsLbl,repsInp);

      // Delete button (defined early so both branches can use it)
      const delBtn=el('button','plan-del-btn');
      delBtn.textContent='🗑';delBtn.title='מחק סט';
      delBtn.onclick=(()=>{ const idx=i; return ()=>{
        if(ps.sets.length<=1)return;
        ps.sets.splice(idx,1);renderSetRows();
      }; })();

      // Weight input (not for timed)
      const isTimed=ex.track==='timed';
      if(!isTimed){
        const wtWrap=el('div','plan-inp-wrap');
        const wtLbl=el('div','plan-inp-lbl');wtLbl.textContent='משקל (ק"ג)';
        const wtInp=el('input','plan-inp');
        wtInp.type='number';wtInp.min='0';wtInp.step='0.5';
        wtInp.value=s.weight||'';wtInp.placeholder='0';
        wtInp.oninput=(()=>{ const idx=i; return ()=>{ ps.sets[idx].weight=parseFloat(wtInp.value)||0; }; })();
        wtWrap.append(wtLbl,wtInp);
        row.append(lbl,repsWrap,wtWrap,delBtn);
      } else {
        row.style.gridTemplateColumns='auto 1fr auto';
        row.append(lbl,repsWrap,delBtn);
      }
      setsWrap.appendChild(row);
    });

    // Add set button
    const addBtn=el('button','plan-add-btn');
    addBtn.textContent='+ הוסף סט';
    addBtn.onclick=()=>{
      const last=ps.sets[ps.sets.length-1]||{reps:ex.defaultReps,weight:0};
      ps.sets.push({reps:last.reps,weight:last.weight});
      renderSetRows();
    };
    setsWrap.appendChild(addBtn);
  }

  renderSetRows();
  card.appendChild(setsWrap);
  return card;
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startWorkout(num,resuming){
  currentWorkoutNum=num; WORKOUT=getEffectiveWorkout(num);
  if(!resuming){ exIdx=0;setsDone=0;workoutStartTime=nowSec();sessionLog=[];skippedQueue=[]; }
  document.getElementById('backBtn').style.display='block';
  document.getElementById('progressArea').style.display='block';
  if(!resuming) startWorkoutTimer();
  else { startWorkoutTimer(); }
  updateProgress(); renderExercise();
}

// ── Exercise ──────────────────────────────────────────────────────────────────
function renderExercise(){
  appScreen='exercise';
  stopSlideTimer();clearInterval(timerInterval);
  const e=WORKOUT[exIdx];
  const ps=plannedSets[e.name]||{rest:e.defaultRest,sets:[{reps:e.defaultReps,weight:0}]};
  const totalSets=ps.sets.length;
  const isLastSet=setsDone+1>=totalSets;
  const currentSet=ps.sets[setsDone]||ps.sets[ps.sets.length-1];
  const s=typeStyle(e.type);
  curSlide=0; setStartTime=nowSec();

  if(setsDone===0){
    currentExLog={name:e.name,rest:ps.rest,plannedSets:totalSets,sets:[],setDetails:[]};
  }

  const isSkippedReturn=skippedQueue.includes(exIdx);
  const wrap=el('div','exercise-screen');

  if(isSkippedReturn){
    const banner=el('div','skipped-banner');banner.textContent='⏭ חזרת לתרגיל שדולג — '+e.name;
    wrap.appendChild(banner);
  }

  const badge=el('div','badge');
  const bspan=el('span');bspan.style.background=s.bg;bspan.style.color=s.color;bspan.textContent=typeLabel(e.type);badge.appendChild(bspan);
  const name=el('div','ex-name');name.textContent=e.name;
  wrap.append(badge,name,buildSlider(e));

  // ── Live edit for current set ─────────────────────────────────────────────
  if(e.track){
    const editRow=el('div','edit-row');
    const isTimed=e.track==='timed';

    // Weight (only for non-timed)
    if(!isTimed){
      const wbox=el('div','edit-box');
      const wlbl=el('div','edit-lbl');wlbl.textContent='⚖️ משקל (ק"ג)';
      const winp=el('input','edit-inp');winp.id='live-weight';winp.type='number';winp.min='0';winp.step='0.5';
      winp.value=currentSet.weight||'';winp.placeholder='0';
      winp.oninput=()=>{ const v=parseFloat(winp.value)||0; if(ps.sets[setsDone])ps.sets[setsDone].weight=v; };
      wbox.append(wlbl,winp);editRow.appendChild(wbox);
    }

    // Reps / Time
    const rbox2=el('div','edit-box');
    const rlbl=el('div','edit-lbl');rlbl.textContent=isTimed?'⏱ זמן (שניות)':'🔁 חזרות';
    const rinp=el('input','edit-inp');rinp.id='live-reps';rinp.type='number';rinp.min='1';rinp.step='1';
    rinp.value=currentSet.reps||'';rinp.placeholder=String(e.defaultReps);
    rinp.oninput=()=>{
      const v=parseInt(rinp.value);
      const finalV=(isNaN(v)||v<=0)?e.defaultReps:v;
      if(ps.sets[setsDone])ps.sets[setsDone].reps=finalV;
      const rd=document.getElementById('reps-display');if(rd)rd.textContent=finalV;
    };
    rbox2.append(rlbl,rinp);editRow.appendChild(rbox2);

    // Rest
    const restbox=el('div','edit-box');
    const restlbl=el('div','edit-lbl');restlbl.textContent='💤 מנוחה (ש\')';
    const restinp=el('input','edit-inp');restinp.id='live-rest';restinp.type='number';restinp.min='0';restinp.step='5';
    restinp.value=ps.rest||'';restinp.placeholder=String(e.defaultRest);
    restinp.oninput=()=>{ ps.rest=parseInt(restinp.value)||e.defaultRest; };
    const restunit=el('div','edit-unit');restunit.textContent='שניות';
    restbox.append(restlbl,restinp,restunit);editRow.appendChild(restbox);

    wrap.appendChild(editRow);
  }

  // Reps display
  const rbox=el('div','reps-box');
  if(totalSets>1){
    const track=el('div','sets-track');
    for(let i=0;i<totalSets;i++){
      const b=el('div','set-bar '+(i<setsDone?'set-done':i===setsDone?'set-current':'set-pending'));
      b.style.width=(i<setsDone?36:i===setsDone?28:22)+'px';track.appendChild(b);
    }
    const slbl=el('div','set-label');slbl.textContent='סט '+(setsDone+1)+' מתוך '+totalSets;rbox.append(track,slbl);
  }

  const isTimedEx=(e.track==='timed'||e.track==='time');
  const timedDuration=currentSet.reps||e.defaultReps;
  const timedUnit=e.repsUnit||'שניות';

  if(isTimedEx){
    // Show countdown ring (like rest timer) with manual "done" button
    const R=54, Circ=2*Math.PI*R;
    let timedT=timedDuration;
    let timedRunning=false;

    const timedWrap=el('div','timed-ex-wrap');
    const timedInfo=el('div','rest-label');
    timedInfo.textContent='⏱ '+(timedUnit==='דקות'?timedDuration+' דקות':timedDuration+' שניות');
    const ring=el('div','timer-ring');
    ring.innerHTML=`<svg width="140" height="140" class="timer-svg">
      <circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--border)" stroke-width="8"/>
      <circle id="exTimerCirc" cx="70" cy="70" r="${R}" fill="none" stroke="var(--accent2)" stroke-width="8"
        stroke-dasharray="${Circ} ${Circ}" stroke-linecap="round" style="transition:stroke-dasharray .5s linear,stroke .3s"/>
    </svg>
    <div class="timer-center">
      <span class="timer-num" id="exTimerNum" style="color:var(--accent2)">${timedT}</span>
      <span class="timer-sec">${timedUnit}</span>
    </div>`;

    const startPauseBtn=el('button','timed-start-btn');
    startPauseBtn.textContent='▶ התחילי';
    let exTimerInt=null;
    startPauseBtn.onclick=()=>{
      if(!timedRunning){
        timedRunning=true; startPauseBtn.textContent='⏸ השהי';
        exTimerInt=setInterval(()=>{
          if(timedUnit!=='דקות'){
            timedT--;
          } else {
            // minutes - count in seconds internally
            timedT--;
          }
          const elNum=document.getElementById('exTimerNum');
          const elCirc=document.getElementById('exTimerCirc');
          if(!elNum){clearInterval(exTimerInt);return;}
          const displayVal=timedUnit==='דקות'?Math.ceil(timedT/60):timedT;
          // Actually count raw seconds for minutes too
          const rawT=timedUnit==='דקות'?timedDuration*60:timedDuration;
          const usedT=timedUnit==='דקות'?timedDuration*60-timedT:timedDuration-timedT;
          const remaining=rawT-usedT;
          const dispRemaining=timedUnit==='דקות'?Math.ceil(remaining/60):remaining;
          if(dispRemaining<=0){
            clearInterval(exTimerInt); timedRunning=false;
            elNum.textContent='0'; elCirc.style.strokeDasharray='0 '+Circ;
            beepAndVibrate();
            startPauseBtn.textContent='✓ סיימתי';
            startPauseBtn.onclick=handleAction;
            return;
          }
          elNum.textContent=dispRemaining;
          elCirc.style.strokeDasharray=(Circ*(remaining/rawT))+' '+Circ;
        },1000);
      } else {
        timedRunning=false; startPauseBtn.textContent='▶ המשיכי';
        clearInterval(exTimerInt);
      }
    };

    timedWrap.append(timedInfo,ring,startPauseBtn);
    rbox.appendChild(timedWrap);
  } else {
    const rnum=el('span','reps-num');rnum.id='reps-display';
    rnum.textContent=String(currentSet.reps||e.defaultReps);
    rbox.appendChild(rnum);
    if(!e.repsUnit){ const rl=el('span','reps-label');rl.textContent='חזרות';rbox.appendChild(rl); }
  }

  const tip=el('div','tip');
  const tipico=el('span');tipico.style.fontSize='18px';tipico.style.flexShrink='0';tipico.textContent='💡';
  const tipp=el('p');tipp.textContent=e.tips;
  tip.append(tipico,tipp);
  const yt=el('a','yt-link');yt.href=ytLink(e.yt);yt.target='_blank';yt.textContent='▶ צפי בסרטון הדרכה ביוטיוב';

  const btnDone=el('button','btn-main');
  btnDone.style.background=s.bg;btnDone.style.color=s.color;btnDone.style.boxShadow='none';btnDone.style.animation='none';
  btnDone.textContent=isLastSet?'✓ סיימתי את התרגיל':'✓ סיימתי את הסט';
  btnDone.onclick=handleAction;

  const secRow=el('div','sec-btn-row');
  if(totalSets>1 && setsDone>0 && !isLastSet){
    const btnEarly=el('button','btn-early');
    btnEarly.textContent='🏁 סיים מוקדם ('+setsDone+' סטים)';
    btnEarly.onclick=finishEarly;
    secRow.appendChild(btnEarly);
  }
  if(e.type==='exercise'){
    const btnSkip=el('button','btn-skip');
    btnSkip.textContent='⏭ המתקן תפוס — דלג לעכשיו';
    btnSkip.onclick=skipExercise;
    secRow.appendChild(btnSkip);
  }
  // Go back to previous exercise (if there is one and setsDone===0)
  if(exIdx>0 && setsDone===0){
    const btnPrev=el('button','btn-prev-ex');
    const prevEx=WORKOUT[exIdx-1];
    btnPrev.textContent='← חזור: '+prevEx.name;
    btnPrev.onclick=()=>goBackExercise();
    secRow.appendChild(btnPrev);
  }

  wrap.append(rbox,tip,yt,btnDone,secRow);
  setScreen(wrap);
  if(e.slides&&e.slides.length>1)startSlideTimer();
}

// ── Skip ──────────────────────────────────────────────────────────────────────
function skipExercise(){
  stopSlideTimer();clearInterval(timerInterval);
  if(!skippedQueue.includes(exIdx)) skippedQueue.push(exIdx);
  if(currentExLog){ currentExLog.skipped=true; sessionLog.push(currentExLog); currentExLog=null; }
  setsDone=0; autoSaveState(); advanceToNext();
}

// ── Early finish ──────────────────────────────────────────────────────────────
function finishEarly(){
  stopSlideTimer();clearInterval(timerInterval);
  const e=WORKOUT[exIdx];
  const ps=plannedSets[e.name]||{rest:e.defaultRest};
  if(currentExLog){ currentExLog.earlyFinish=true; currentExLog.actualSets=setsDone; sessionLog.push(currentExLog); currentExLog=null; }
  setsDone=0;
  if(ps.rest>0) startRest(ps.rest,true,true);
  else advanceToNext();
}

// ── Advance ───────────────────────────────────────────────────────────────────
function advanceToNext(){
  exIdx++; setsDone=0;
  if(exIdx>=WORKOUT.length){
    if(skippedQueue.length>0) showSkippedPrompt();
    else renderSummary();
  } else {
    updateProgress(); renderExercise();
  }
}

// ── Skipped prompt ────────────────────────────────────────────────────────────
function showSkippedPrompt(){
  appScreen='exercise';
  const wrap=el('div','exercise-screen');
  const title=el('div','ex-name');title.style.fontSize='24px';title.textContent='⏭ תרגילים שדולגו';
  const info=el('div','tip');

  const txt=el('p');txt.textContent='יש '+skippedQueue.length+' תרגילים שדולגו. רוצה לחזור אליהם?';
  info.append(ico,txt);wrap.append(title,info);
  skippedQueue.forEach((idx,qi)=>{
    const e=WORKOUT[idx];
    const card=el('div','skipped-card');
    const cname=el('div','skipped-card-name');cname.textContent=e.icon+' '+e.name;
    const btnDo=el('button','btn-main');
    btnDo.style.cssText='padding:12px;font-size:15px;box-shadow:none;animation:none;';
    btnDo.textContent='✓ בצעי עכשיו';
    btnDo.onclick=(()=>{ const i=idx,q=qi; return ()=>{
      skippedQueue.splice(q,1); exIdx=i; setsDone=0; updateProgress(); renderExercise();
    }; })();
    const btnAbandon=el('button','btn-skip');
    btnAbandon.textContent='✗ ויתרתי על תרגיל זה';
    btnAbandon.onclick=(()=>{ const i=idx,q=qi; return ()=>{
      skippedQueue.splice(q,1);
      sessionLog.push({name:WORKOUT[i].name,weight:0,reps:0,rest:0,plannedSets:WORKOUT[i].defaultSets,sets:[],setDetails:[],skipped:true,abandoned:true});
      if(skippedQueue.length===0) renderSummary(); else showSkippedPrompt();
    }; })();
    card.append(cname,btnDo,btnAbandon); wrap.appendChild(card);
  });
  const btnEnd=el('button','btn-secondary');btnEnd.textContent='סיים את האימון →';btnEnd.onclick=renderSummary;btnEnd.style.marginTop='8px';
  wrap.appendChild(btnEnd);
  setScreen(wrap);
}

// ── Handle action ─────────────────────────────────────────────────────────────
function handleAction(){
  const e=WORKOUT[exIdx];
  const ps=plannedSets[e.name]||{rest:e.defaultRest,sets:[{reps:e.defaultReps,weight:0}]};
  const isLast=setsDone+1>=ps.sets.length;
  const setTime=setStartTime?Math.max(1,nowSec()-setStartTime):0;
  const currentSet=ps.sets[setsDone]||{reps:e.defaultReps,weight:0};
  const savedReps=currentSet.reps||e.defaultReps;
  const savedWeight=currentSet.weight!=null?currentSet.weight:0;
  if(currentExLog){ 
    currentExLog.sets.push({setTime}); 
    currentExLog.setDetails.push({reps:savedReps, weight:savedWeight, setTime}); 
  }
  autoSaveState();
  if(isLast){ ps.rest>0?startRest(ps.rest,true,false):finishExercise(); }
  else{ startRest(ps.rest,false,false); }
}

function finishExercise(){
  if(currentExLog){ sessionLog.push(currentExLog); currentExLog=null; }
  const qi=skippedQueue.indexOf(exIdx);if(qi>=0)skippedQueue.splice(qi,1);
  setsDone=0; autoSaveState(); advanceToNext();
}

// ── Rest ──────────────────────────────────────────────────────────────────────
function startRest(seconds,isLastSet,isEarlyFinish){
  appScreen='rest';
  stopSlideTimer();clearInterval(timerInterval);
  const e=WORKOUT[exIdx];const s=typeStyle(e.type);
  let t=seconds;const R=54,Circ=2*Math.PI*R;
  lastRestStart=nowSec();
  const wrap=el('div','exercise-screen');
  const badge=el('div','badge');
  const bspan=el('span');bspan.style.background=s.bg;bspan.style.color=s.color;bspan.textContent=typeLabel(e.type);badge.appendChild(bspan);
  const name=el('div','ex-name');name.textContent=e.name;
  const rw=el('div','rest-wrap');
  const rl=el('div','rest-label');
  if(isEarlyFinish) rl.innerHTML='🏁 סיום מוקדם — '+setsDone+' סטים<br>מנוחה לפני התרגיל הבא';
  else rl.innerHTML=isLastSet?'✅ תרגיל הסתיים!<br>מנוחה לפני הבא':'💤 מנוחה בין סטים — '+seconds+' שניות';
  const ring=el('div','timer-ring');
  ring.innerHTML=`<svg width="140" height="140" class="timer-svg">
    <circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--border)" stroke-width="8"/>
    <circle id="timerCirc" cx="70" cy="70" r="${R}" fill="none" stroke="var(--accent)" stroke-width="8"
      stroke-dasharray="${Circ} ${Circ}" stroke-linecap="round" style="transition:stroke-dasharray .5s linear,stroke .3s"/>
  </svg>
  <div class="timer-center">
    <span class="timer-num" id="timerNum" style="color:var(--accent)">${t}</span>
    <span class="timer-sec">שניות</span>
  </div>`;
  const skip=el('button','skip-btn');skip.textContent='דלג על המנוחה ←';skip.onclick=()=>skipRest(isLastSet,isEarlyFinish,seconds-t);
  rw.append(rl,ring,skip);wrap.append(badge,name,rw);setScreen(wrap);
  timerInterval=setInterval(()=>{
    t--;
    const elNum=document.getElementById('timerNum'),elCirc=document.getElementById('timerCirc');
    if(!elNum){clearInterval(timerInterval);return;}
    const urgent=t<=10,color=urgent?'var(--accent2)':'var(--accent)';
    elNum.textContent=t;elNum.style.color=color;
    elNum.style.animation=urgent?'tick .5s ease-in-out infinite':'none';
    elCirc.style.stroke=color;elCirc.style.strokeDasharray=(Circ*(t/seconds))+' '+Circ;
    if(t<=0){clearInterval(timerInterval);beepAndVibrate();setTimeout(()=>skipRest(isLastSet,isEarlyFinish,seconds),600);}
  },1000);
}

function skipRest(isLastSet,isEarlyFinish,restDone){
  clearInterval(timerInterval);
  const actual=restDone!=null?restDone:nowSec()-(lastRestStart||nowSec());
  if(currentExLog&&currentExLog.sets.length) currentExLog.sets[currentExLog.sets.length-1].restTime=actual;
  if(isEarlyFinish||isLastSet) finishExercise(); else{ setsDone++;renderExercise(); }
}

function renderHistoryContent(wrap, wNum){
  const content=document.getElementById('hist-content');
  if(!content)return;
  content.innerHTML='';

  const history=getHistory(wNum);
  if(!history.length){
    const empty=el('div','hist-empty');
    empty.textContent='עוד אין אימונים מוקלטים לאימון '+(wNum===1?'א':'ב');
    content.appendChild(empty);
    return;
  }

  // Summary stats
  const sessions=history.slice().reverse(); // newest first
  const totalSessions=sessions.length;
  const totalTime=sessions.reduce((a,s)=>a+(s.totalTime||0),0);
  const lastDate=new Date(sessions[0].date);

  const summaryGrid=el('div','hist-summary-grid');
  [[totalSessions,'אימונים'],[formatTime(Math.round(totalTime/totalSessions)),'זמן ממוצע'],[lastDate.toLocaleDateString('he-IL'),'אחרון']].forEach(([v,l])=>{
    const s=el('div','hist-summary-stat');
    const sv=el('div','hist-stat-val');sv.textContent=v;
    const sl=el('div','hist-stat-lbl');sl.textContent=l;
    s.append(sv,sl);summaryGrid.appendChild(s);
  });
  content.appendChild(summaryGrid);

  // Build exercise list for charts
  const exerciseMap={};
  sessions.forEach(session=>{
    const date=new Date(session.date).toLocaleDateString('he-IL');
    (session.exercises||[]).forEach(ex=>{
      if(!ex.setDetails||!ex.setDetails.length)return;
      if(!exerciseMap[ex.name])exerciseMap[ex.name]=[];
      // Max weight in session
      const maxW=Math.max(...ex.setDetails.map(s=>s.weight||0));
      const totalReps=ex.setDetails.reduce((a,s)=>a+(s.reps||0),0);
      exerciseMap[ex.name].push({date,maxW,totalReps,sets:ex.setDetails.length,session});
    });
  });

  // Charts per exercise
  const exercises=Object.keys(exerciseMap).filter(k=>exerciseMap[k].some(e=>e.maxW>0));
  if(exercises.length){
    const chartTitle=el('div','hist-section-title');chartTitle.textContent='📈 התקדמות משקל';
    content.appendChild(chartTitle);
    exercises.forEach(name=>{
      const data=exerciseMap[name].slice().reverse(); // chronological
      if(data.length<1)return;
      const card=buildChart(name,data);
      content.appendChild(card);
    });
  }

  // Session list
  const sessTitle=el('div','hist-section-title');sessTitle.textContent='📋 רשימת אימונים';
  content.appendChild(sessTitle);

  sessions.forEach((session,si)=>{
    const card=el('div','sess-card');
    const d=new Date(session.date);
    const hdr=el('div','sess-hdr');
    const dt=el('div','sess-date');dt.textContent=d.toLocaleDateString('he-IL')+' — '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    const dur=el('div','sess-dur');dur.textContent='⏱ '+formatTime(session.totalTime);
    hdr.append(dt,dur);card.appendChild(hdr);

    (session.exercises||[]).forEach(ex=>{
      if(ex.skipped&&ex.abandoned)return;
      const exrow=el('div','sess-ex-row');
      const exname=el('div','sess-ex-name');exname.textContent=ex.name+(ex.earlyFinish?' ⚡':'');
      exrow.appendChild(exname);
      if(ex.setDetails&&ex.setDetails.length){
        const sets=el('div','sess-sets');
        ex.setDetails.forEach((sd,i)=>{
          const s=el('span','sess-set');
          s.textContent='סט'+(i+1)+': '+(sd.reps||'?')+'×'+(sd.weight?sd.weight+'ק"ג':'—');
          sets.appendChild(s);
        });
        exrow.appendChild(sets);
      }
      card.appendChild(exrow);
    });

    // Delete session button
    const delBtn=el('button','sess-del-btn');delBtn.textContent='🗑 מחק';
    delBtn.onclick=(()=>{const idx=history.length-1-si; return ()=>{
      if(!confirm('למחוק אימון זה?'))return;
      const h=getHistory(wNum);h.splice(idx,1);saveHistory(wNum,h);
      renderHistoryContent(wrap,wNum);
    }; })();
    card.appendChild(delBtn);
    content.appendChild(card);
  });
}

// ── SVG Chart ─────────────────────────────────────────────────────────────────
function buildChart(name, data){
  const card=el('div','chart-card');
  const title=el('div','chart-title');title.textContent=name;
  card.appendChild(title);

  if(data.length<2){
    const note=el('div','chart-note');note.textContent='נדרשים לפחות 2 אימונים לגרף';
    card.appendChild(note);
    return card;
  }

  const W=320,H=130,PL=36,PR=12,PT=10,PB=28;
  const IW=W-PL-PR, IH=H-PT-PB;
  const weights=data.map(d=>d.maxW);
  const minW=Math.min(...weights), maxW=Math.max(...weights);
  const range=maxW-minW||1;

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width','100%');
  svg.style.display='block';

  function mkEl(tag,attrs){
    const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
    Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));
    return e;
  }

  // Background
  svg.appendChild(mkEl('rect',{width:W,height:H,fill:'#0d0a14',rx:8}));

  // Grid lines (3)
  [0,0.5,1].forEach(t=>{
    const y=PT+IH*(1-t);
    svg.appendChild(mkEl('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#2e2840',strokeWidth:1}));
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',PL-4);lbl.setAttribute('y',y+4);
    lbl.setAttribute('text-anchor','end');lbl.setAttribute('font-size','9');
    lbl.setAttribute('fill','#8b80a8');lbl.setAttribute('font-family','Heebo,sans-serif');
    lbl.textContent=Math.round(minW+range*t);
    svg.appendChild(lbl);
  });

  // Points and line
  const pts=data.map((d,i)=>{
    const x=PL+(i/(data.length-1))*IW;
    const y=PT+IH*(1-(d.maxW-minW)/range);
    return{x,y,d};
  });

  // Gradient fill
  const defs=mkEl('defs');
  const grad=mkEl('linearGradient',{id:'chartGrad'+name.replace(/[^a-z]/gi,''),x1:'0%',y1:'0%',x2:'0%',y2:'100%'});
  const s1=mkEl('stop',{offset:'0%','stop-color':'#c084fc','stop-opacity':'0.4'});
  const s2=mkEl('stop',{offset:'100%','stop-color':'#c084fc','stop-opacity':'0'});
  grad.append(s1,s2);defs.appendChild(grad);svg.appendChild(defs);

  // Area fill
  const areaD='M'+pts[0].x+','+(PT+IH)+' '+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${PT+IH} Z`;
  svg.appendChild(mkEl('path',{d:areaD,fill:`url(#chartGrad${name.replace(/[^a-z]/gi,'')})`}));

  // Line
  const lineD='M'+pts.map(p=>`${p.x},${p.y}`).join(' L');
  svg.appendChild(mkEl('path',{d:lineD,fill:'none',stroke:'#c084fc',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}));

  // Dots + labels
  pts.forEach((p,i)=>{
    svg.appendChild(mkEl('circle',{cx:p.x,cy:p.y,r:4,fill:'#c084fc',stroke:'#0d0a14',strokeWidth:2}));
    // Weight label above dot
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',p.x);lbl.setAttribute('y',p.y-8);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','9');
    lbl.setAttribute('fill','#f472b6');lbl.setAttribute('font-family','Heebo,sans-serif');
    lbl.setAttribute('font-weight','700');
    lbl.textContent=p.d.maxW+'ק"ג';
    svg.appendChild(lbl);
    // Date label below
    if(i===0||i===pts.length-1||data.length<=4){
      const dlbl=document.createElementNS('http://www.w3.org/2000/svg','text');
      dlbl.setAttribute('x',p.x);dlbl.setAttribute('y',H-4);
      dlbl.setAttribute('text-anchor',i===0?'start':i===pts.length-1?'end':'middle');
      dlbl.setAttribute('font-size','8');dlbl.setAttribute('fill','#8b80a8');
      dlbl.setAttribute('font-family','Heebo,sans-serif');
      dlbl.textContent=p.d.date;
      svg.appendChild(dlbl);
    }
  });

  card.appendChild(svg);

  // Delta badge
  const first=weights[0], last=weights[weights.length-1];
  if(last>first){
    const badge=el('div','chart-badge up');badge.textContent='↑ +'+(last-first)+'ק"ג מתחילת האימונים';
    card.appendChild(badge);
  } else if(last<first){
    const badge=el('div','chart-badge down');badge.textContent='↓ '+(last-first)+'ק"ג';
    card.appendChild(badge);
  }

  return card;
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportData(){
  const data={version:13,exportDate:new Date().toISOString(),w1:getHistory(1),w2:getHistory(2)};
  const json=JSON.stringify(data,null,2);
  try{
    // Try data URI (works in Chrome mobile)
    const uri='data:application/json;charset=utf-8,'+encodeURIComponent(json);
    const a=document.createElement('a');
    a.href=uri;
    a.download='liron_workout_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){
    // Fallback: copy JSON to clipboard
    copyFallback(json.split('\n'), document.getElementById('exportBtnEl')||{textContent:''});
    alert('הקובץ הועתק ללוח — הדבקי בהערות או WhatsApp');
  }
}

// ── Import ────────────────────────────────────────────────────────────────────
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.w1){ saveHistory(1,data.w1); }
      if(data.w2){ saveHistory(2,data.w2); }
      alert('✅ הנתונים יובאו בהצלחה! '+
        (data.w1?data.w1.length+' אימוני א\' ':'')+(data.w2?data.w2.length+' אימוני ב\'':''));
      renderHistoryScreen();
    }catch(err){
      alert('❌ שגיאה בקריאת הקובץ');
    }
  };
  reader.readAsText(file);
}

function copyFallback(lines, btn){
  try{
    const ta=document.createElement('textarea');
    ta.value=lines.join('\n');
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:12px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    const ok=document.execCommand('copy');
    document.body.removeChild(ta);
    if(ok){ btn.textContent='✅ הועתק!';setTimeout(()=>btn.textContent='📋 העתיקי את הסיכום',2000); }
    else{ btn.textContent='⚠️ לא נתמך בדפדפן זה'; }
  }catch(e){ btn.textContent='⚠️ פתחי ב-Chrome'; }
}


// ── Go back to previous exercise ─────────────────────────────────────────────
function goBackExercise(){
  if(exIdx<=0) return;
  // Save current exercise log if any sets done
  if(currentExLog && currentExLog.sets && currentExLog.sets.length>0){
    sessionLog.push(currentExLog);
  }
  currentExLog=null;
  setsDone=0;
  exIdx--;
  // Remove from sessionLog if it was already logged (going back to redo it)
  const prevName=WORKOUT[exIdx].name;
  const logIdx=sessionLog.map(e=>e.name).lastIndexOf(prevName);
  if(logIdx>=0) sessionLog.splice(logIdx,1);
  // Remove from skippedQueue if it was skipped
  const qi=skippedQueue.indexOf(exIdx);
  if(qi>=0) skippedQueue.splice(qi,1);
  updateProgress();
  renderExercise();
}


// ── Auto-save workout state ───────────────────────────────────────────────────
const AUTOSAVE_KEY = 'liron_workout_autosave';

function autoSaveState(){
  try{
    const state={
      currentWorkoutNum,
      exIdx,
      setsDone,
      workoutStartTime,
      sessionLog:JSON.parse(JSON.stringify(sessionLog)),
      currentExLog:currentExLog?JSON.parse(JSON.stringify(currentExLog)):null,
      plannedSets:JSON.parse(JSON.stringify(plannedSets)),
      skippedQueue:[...skippedQueue],
      savedAt:Date.now()
    };
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(state));
  }catch(e){ /* silent fail */ }
}

function loadAutoSave(){
  try{
    const raw=localStorage.getItem(AUTOSAVE_KEY);
    if(!raw) return null;
    const state=JSON.parse(raw);
    // Only restore if saved within last 24 hours
    if(Date.now()-state.savedAt > 24*60*60*1000){
      localStorage.removeItem(AUTOSAVE_KEY);
      return null;
    }
    return state;
  }catch(e){ return null; }
}

function clearAutoSave(){
  try{ localStorage.removeItem(AUTOSAVE_KEY); }catch(e){}
}

function restoreAutoSave(state){
  currentWorkoutNum = state.currentWorkoutNum;
  WORKOUT = getEffectiveWorkout(currentWorkoutNum);
  exIdx = state.exIdx;
  setsDone = state.setsDone;
  workoutStartTime = state.workoutStartTime;
  sessionLog = state.sessionLog||[];
  currentExLog = state.currentExLog||null;
  plannedSets = state.plannedSets||{};
  skippedQueue = state.skippedQueue||[];
}


// ── Workout Timer ─────────────────────────────────────────────────────────────
let workoutTimerInterval = null;

function startWorkoutTimer(){
  stopWorkoutTimer();
  const el = document.getElementById('workoutTimer');
  if(el) el.classList.add('visible');
  workoutTimerInterval = setInterval(updateWorkoutTimer, 1000);
  updateWorkoutTimer();
}

function stopWorkoutTimer(){
  if(workoutTimerInterval){ clearInterval(workoutTimerInterval); workoutTimerInterval=null; }
  const el = document.getElementById('workoutTimer');
  if(el) el.classList.remove('visible');
}

function updateWorkoutTimer(){
  if(!workoutStartTime) return;
  const el = document.getElementById('workoutTimer');
  if(!el) return;
  const elapsed = nowSec() - workoutStartTime;
  const h = Math.floor(elapsed/3600);
  const m = Math.floor((elapsed%3600)/60);
  const s = elapsed%60;
  el.textContent = (h>0?(h+':'):'') +
    String(m).padStart(h>0?2:1,'0')+':'+
    String(s).padStart(2,'0');
}
